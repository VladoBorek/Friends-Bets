workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

.docker-job:
  tags:
    - shared-fi
  image: docker:27-cli
  services:
    - name: docker:27-dind-rootless
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    COMPOSE_DOCKER_CLI_BUILD: "1"
    DOCKER_DRIVER: overlay2
    NODE_BASE_IMAGE: "${CI_REGISTRY_IMAGE}/base-node:22-bookworm-slim"
    DEV_CACHE_IMAGE: "${CI_REGISTRY_IMAGE}/dev:cache"
  before_script:
    - test -n "$CI_REGISTRY_IMAGE"
    - |
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "Waiting for Docker daemon..."
        sleep 2
      done
    - docker version
    - docker compose version
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker pull "$DEV_CACHE_IMAGE" || true
    - docker build
        --cache-from "$DEV_CACHE_IMAGE"
        --build-arg BUILDKIT_INLINE_CACHE=1
        --build-arg NODE_BASE_IMAGE="$NODE_BASE_IMAGE"
        -t pb138-project-dev
        -t "$DEV_CACHE_IMAGE"
        -f Dockerfile.dev .
    - docker push "$DEV_CACHE_IMAGE"

stages:
  - prepare
  - test
  - build
  - deploy

mirror-node-base:
  stage: prepare
  tags:
    - shared-fi
  image: docker:27-cli
  services:
    - name: docker:27-dind-rootless
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    DOCKER_DRIVER: overlay2
    NODE_BASE_IMAGE: "${CI_REGISTRY_IMAGE}/base-node:22-bookworm-slim"
  rules:
    - when: manual
  before_script:
    - test -n "$CI_REGISTRY_IMAGE"
    - echo "$CI_REGISTRY_IMAGE"
    - |
      for i in $(seq 1 30); do
        docker info >/dev/null 2>&1 && break
        echo "Waiting for Docker daemon..."
        sleep 2
      done
    - docker version
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker pull node:22-bookworm-slim
    - docker tag node:22-bookworm-slim "$NODE_BASE_IMAGE"
    - docker push "$NODE_BASE_IMAGE"

verify:
  extends: .docker-job
  stage: test
  script:
    - docker compose --profile tools run --rm app npm run lint:local
    - docker compose --profile tools run --rm app npm run test:local
  after_script:
    - docker compose down --remove-orphans

build:
  extends: .docker-job
  stage: build
  script:
    - docker compose --profile tools run --rm app npm run generate:local
    - docker compose --profile tools run --rm app npm run build:local
  artifacts:
    paths:
      - dist/
      - client/src/api/gen/
      - client/src/routeTree.gen.ts
    expire_in: 1 week
  after_script:
    - docker compose down --remove-orphans

