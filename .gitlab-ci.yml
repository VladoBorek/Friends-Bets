workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

default:
  image: node:24
  tags:
    - shared-fi
  cache:
    key: "${CI_PROJECT_PATH_SLUG}-${CI_COMMIT_REF_SLUG}-node24"
    paths:
      - node_modules/
    policy: pull-push

stages:
  - validate

lint:
  stage: validate
  script:
    - npm ci
    - npm run lint

build:
  stage: validate
  script:
    - npm ci
    - npm run build
